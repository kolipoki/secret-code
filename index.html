<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mechanical Cryptex</title>
    <style>
        body { margin: 0; background: #0f0f0f; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        
        #ui { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 30px; box-sizing: border-box; 
        }

        /* The Selection Rectangle */
        #selector-box {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 320px; /* Wraps the vertical stack */
            border: 4px solid #d4af37;
            border-radius: 10px;
            box-shadow: 0 0 20px #8b6d0d, inset 0 0 15px #8b6d0d;
            background: rgba(212, 175, 55, 0.05);
            pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-around;
        }

        /* Marker line in the center of the box */
        .marker { width: 100%; height: 2px; background: rgba(212, 175, 55, 0.3); }

        #submit-btn {
            pointer-events: auto; background: #d4af37; border: none; 
            padding: 15px 40px; font-size: 1.2rem; font-weight: bold; 
            border-radius: 5px; cursor: pointer; color: #111;
            box-shadow: 0 5px 0 #8b6d0d;
        }
        #submit-btn:active { transform: translateY(4px); box-shadow: none; }

        #reward { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; background: #111; padding: 40px; border: 3px solid #d4af37; z-index: 1000;
        }
        .qr-image { width: 200px; border: 10px solid #fff; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="color: #d4af37; letter-spacing: 5px; margin: 0;">CRYPTEX v2.0</h2>
        <div id="selector-box">
            <div class="marker"></div><div class="marker"></div><div class="marker"></div>
        </div>
        <button id="submit-btn" onclick="checkCode()">OPEN LOCK</button>
    </div>

    <div id="reward">
        <h1 style="color: #d4af37;">UNLOCKED</h1>
        <img src="reward-qr.png" class="qr-image" alt="Secret QR">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <script>
        const PIN = [1, 3, 3, 7]; // Set your code here
        let currentStatus = [0, 0, 0, 0];
        const rings = [];
        
        // 1. Scene & Lighting (High Visibility Setup)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.7); // Bright overall light
        scene.add(ambient);
        
        const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
        keyLight.position.set(5, 5, 10);
        scene.add(keyLight);

        const fillLight = new THREE.PointLight(0xffd700, 0.5); // Warm gold fill
        fillLight.position.set(-5, 0, 5);
        scene.add(fillLight);

        // 2. Texture Generation (Huge, readable digits)
        function createDigitTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1a1a1a'; // Dark Matte Ring
            ctx.fillRect(0,0,1024,128);
            ctx.fillStyle = '#f1c40f'; // Bright Golden Text
            ctx.font = 'bold 90px Arial';
            ctx.textAlign = 'center';
            for(let i=0; i<10; i++) {
                ctx.fillText(i, (i * 102.4) + 51, 95);
                ctx.strokeStyle = '#333';
                ctx.strokeRect(i * 102.4, 0, 102.4, 128);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            return tex;
        }

        // 3. Building the Vertical Stack
        const cryptexGroup = new THREE.Group();
        const ringGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.8, 40);
        const ringTex = createDigitTexture();
        const ringMat = new THREE.MeshPhongMaterial({ map: ringTex, shininess: 30 });

        for(let i=0; i<4; i++) {
            const ring = new THREE.Mesh(ringGeo, ringMat.clone());
            // Stack them vertically (Y axis)
            ring.position.y = (1.5 - i) * 0.9; 
            ring.userData = { index: i };
            rings.push(ring);
            cryptexGroup.add(ring);
        }

        scene.add(cryptexGroup);
        camera.position.set(0, 0, 8);

        // 4. Interaction (Horizontal Drag for Vertical Stack)
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedRing = null, isDragging = false, lastX = 0;

        function handleDown(e) {
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            mouse.x = (x / window.innerWidth) * 2 - 1;
            mouse.y = -(y / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(rings);
            if (hits.length > 0) {
                selectedRing = hits[0].object;
                isDragging = true;
                lastX = x;
            }
        }

        function handleMove(e) {
            if (!isDragging || !selectedRing) return;
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const deltaX = x - lastX;
            // Drag left/right to rotate the vertical ring
            selectedRing.rotation.y += deltaX * 0.01;
            lastX = x;
            if (navigator.vibrate) navigator.vibrate(5);
        }

        function handleUp() {
            if (selectedRing) {
                const step = (Math.PI * 2) / 10;
                // Note: Cylinder texture 0 starts at rotation 0, so we snap to -rotation
                const target = Math.round(selectedRing.rotation.y / step) * step;
                
                new TWEEN.Tween(selectedRing.rotation)
                    .to({ y: target }, 400)
                    .easing(TWEEN.Easing.Back.Out)
                    .onUpdate(() => {
                        // Calculate which digit is facing front (at rotation 0)
                        let digit = Math.round((-selectedRing.rotation.y / step) % 10);
                        while (digit < 0) digit += 10;
                        currentStatus[selectedRing.userData.index] = digit;
                    })
                    .start();
            }
            isDragging = false;
            selectedRing = null;
        }

        window.addEventListener('mousedown', handleDown);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleUp);
        window.addEventListener('touchstart', handleDown);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', handleUp);

        // 5. Submit Logic
        function checkCode() {
            const win = currentStatus.every((v, i) => v === PIN[i]);
            if (win) {
                if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 400]);
                rings.forEach((r, i) => {
                    new TWEEN.Tween(r.position).to({ x: (i%2==0?1:-1)*10, opacity: 0 }, 1000).start();
                });
                setTimeout(() => {
                    document.getElementById('ui').style.display = 'none';
                    document.getElementById('reward').style.display = 'block';
                }, 800);
            } else {
                if (navigator.vibrate) navigator.vibrate(500);
                // Heavy Shake
                new TWEEN.Tween(cryptexGroup.position).to({ x: 0.3 }, 50).repeat(10).yoyo(true).to({x:0}, 50).start();
            }
        }

        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            if (!isDragging) {
                cryptexGroup.rotation.y = Math.sin(time / 2500) * 0.1;
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
