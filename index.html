<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryptex</title>

<style>

body{
margin:0;
background:#050505;
overflow:hidden;
font-family:Courier New, monospace;
}

#ui{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
padding:40px;
pointer-events:none;
box-sizing:border-box;
}

h2{
color:#d4af37;
letter-spacing:6px;
}

button{
pointer-events:auto;
padding:16px 50px;
background:#d4af37;
border:none;
font-weight:bold;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="ui">
<h2>MECHANICAL UNIT</h2>
<button onclick="checkCode()">ENGAGE LOCK</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

<script>

const PIN=[1,2,3,4]
let current=[0,0,0,0]

const STEP=Math.PI*2/10

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
100
)

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.physicallyCorrectLights=true
document.body.appendChild(renderer.domElement)

scene.add(new THREE.AmbientLight(0xffffff,.6))

const light=new THREE.DirectionalLight(0xffffff,.8)
light.position.set(5,6,8)
scene.add(light)

camera.position.z=7

const rings=[]
const cryptex=new THREE.Group()

scene.add(cryptex)

function createNumberTexture(){

const c=document.createElement("canvas")
c.width=1024
c.height=128

const g=c.getContext("2d")

g.fillStyle="#111"
g.fillRect(0,0,1024,128)

g.textAlign="center"
g.textBaseline="middle"
g.font="bold 90px Arial"

for(let i=0;i<10;i++){

const x=(i+.5)*102.4

g.fillStyle="#ffcc33"

g.shadowColor="#000"
g.shadowBlur=10
g.fillText(i,x,64)

g.strokeStyle="#333"
g.beginPath()
g.moveTo(i*102.4,0)
g.lineTo(i*102.4,128)
g.stroke()

}

return new THREE.CanvasTexture(c)

}

const tex=createNumberTexture()

const geo=new THREE.CylinderGeometry(1.2,1.2,.8,40)
geo.rotateY(Math.PI/2)

for(let i=0;i<4;i++){

const mat=new THREE.MeshStandardMaterial({

map:tex,
metalness:.9,
roughness:.35

})

const ring=new THREE.Mesh(geo,mat)

ring.position.y=(1.5-i)*.95

ring.userData.index=i

rings.push(ring)

cryptex.add(ring)

const frameGeo=new THREE.BoxGeometry(.8,.9,.1)
const frame=new THREE.LineSegments(
new THREE.EdgesGeometry(frameGeo),
new THREE.LineBasicMaterial({color:0xd4af37})
)

frame.position.set(0,ring.position.y,1.22)

scene.add(frame)

}

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

let selected=null
let drag=false
let lastX=0

const click=new Audio(
"https://cdn.jsdelivr.net/gh/jshawl/AudioFX/sounds/click2.wav"
)

function snap(r){

const target=Math.round(r.rotation.y/STEP)*STEP

new TWEEN.Tween(r.rotation)
.to({y:target},400)
.easing(TWEEN.Easing.Back.Out)
.start()

let digit=(-Math.round(target/STEP))%10
digit=(digit+10)%10

current[r.userData.index]=digit

click.currentTime=0
click.play()

}

function down(e){

const x=e.clientX||e.touches[0].clientX
const y=e.clientY||e.touches[0].clientY

mouse.x=x/window.innerWidth*2-1
mouse.y=-(y/window.innerHeight*2-1)

raycaster.setFromCamera(mouse,camera)

const hits=raycaster.intersectObjects(rings)

if(hits.length){

selected=hits[0].object
drag=true
lastX=x
TWEEN.removeAll()

}

}

function move(e){

if(!drag)return

const x=e.clientX||e.touches[0].clientX

const dx=x-lastX

selected.rotation.y+=dx*.008

lastX=x

}

function up(){

if(selected)snap(selected)

drag=false
selected=null

}

window.addEventListener("mousedown",down)
window.addEventListener("mousemove",move)
window.addEventListener("mouseup",up)

window.addEventListener("touchstart",down)
window.addEventListener("touchmove",move)
window.addEventListener("touchend",up)

function checkCode(){

if(current.every((v,i)=>v===PIN[i])){

rings.forEach((r,i)=>{

new TWEEN.Tween(r.position)
.to({z:(i%2?3:-3)},1600)
.easing(TWEEN.Easing.Cubic.Out)
.start()

})

}

else{

new TWEEN.Tween(cryptex.rotation)
.to({z:.1},80)
.repeat(6)
.yoyo(true)
.start()

}

}

function animate(t){

requestAnimationFrame(animate)

TWEEN.update(t)

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
