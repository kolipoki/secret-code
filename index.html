<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Mechanical Cryptex</title>
    <style>
        body { margin: 0; background: #050505; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        
        #ui { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 40px; box-sizing: border-box; 
        }

        h2 { color: #d4af37; letter-spacing: 5px; text-shadow: 0 0 15px #000; margin: 0; text-align: center; }

        #submit-btn {
            pointer-events: auto; background: #d4af37; border: 2px solid #000; 
            padding: 16px 50px; font-size: 1.2rem; font-weight: bold; 
            border-radius: 4px; cursor: pointer; color: #111;
            box-shadow: 0 6px 20px rgba(0,0,0,0.8); transition: 0.1s;
        }
        #submit-btn:active { transform: translateY(3px); box-shadow: none; }

        #reward-container { 
            display: none; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); text-align: center; 
            background: #111; padding: 40px; border: 3px solid #d4af37; 
            z-index: 1000; box-shadow: 0 0 50px #d4af37; color: white;
        }
        .qr-image { width: 220px; border: 6px solid #fff; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>DECODE UNIT</h2>
        <!-- No HTML rectangles here anymore, they are in the 3D scene -->
        <button id="submit-btn" onclick="checkCode()">ENGAGE MECHANISM</button>
    </div>

    <div id="reward-container">
        <h1>ACCESS GRANTED</h1>
        <p>Your secret link is ready:</p>
        <img src="reward-qr.png" class="qr-image" alt="Secret QR">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <script>
        const PIN = [1, 2, 3, 4]; // SET YOUR PIN HERE
        let currentStatus = [0, 0, 0, 0];
        const rings = [];
        const frames = [];
        
        // 1. Scene & Lighting
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Bright studio lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 5, 10);
        scene.add(dirLight);

        // 2. High-Visibility Texture
        function createTex() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#111'; ctx.fillRect(0,0,1024,128);
            ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 95px Arial';
            ctx.textAlign = 'center';
            for(let i=0; i<10; i++) {
                ctx.fillText(i, (i * 102.4) + 51, 95);
                ctx.strokeStyle = '#333'; ctx.strokeRect(i * 102.4, 0, 102.4, 128);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            return tex;
        }

        const cryptexGroup = new THREE.Group();
        const ringGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.8, 40);
        const ringTex = createTex();
        const ringMat = new THREE.MeshPhongMaterial({ map: ringTex, shininess: 50 });

        // 3. Create 3D Rectangles (The Frames)
        const frameGeo = new THREE.BoxGeometry(2.6, 0.9, 0.2); // Slightly wider than the rings
        const frameMat = new THREE.MeshBasicMaterial({ 
            color: 0xd4af37, 
            wireframe: true, 
            transparent: true, 
            opacity: 0.5 
        });

        for(let i=0; i<4; i++) {
            const yPos = (1.5 - i) * 1.0;

            // The Rolling Ring
            const ring = new THREE.Mesh(ringGeo, ringMat.clone());
            ring.position.y = yPos;
            ring.userData = { index: i };
            rings.push(ring);
            cryptexGroup.add(ring);

            // The Fixed Indicator Rectangle (3D Frame)
            const frame = new THREE.Mesh(frameGeo, frameMat);
            frame.position.set(0, yPos, 1.2); // Placed right in front of the ring
            // Create a custom wireframe look manually for better visibility
            const edges = new THREE.EdgesGeometry(frameGeo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xd4af37, linewidth: 2 }));
            line.position.set(0, yPos, 1.2);
            scene.add(line);
            frames.push(line);
        }

        // Top/Bottom End Caps
        const capGeo = new THREE.CylinderGeometry(1.4, 1.4, 0.2, 32);
        const capMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
        const topCap = new THREE.Mesh(capGeo, capMat); topCap.position.y = 2.2;
        const bottomCap = new THREE.Mesh(capGeo, capMat); bottomCap.position.y = -2.2;
        cryptexGroup.add(topCap, bottomCap);

        scene.add(cryptexGroup);
        camera.position.set(0, 0, 8);

        // 4. Interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedRing = null, isDragging = false, lastX = 0;

        function onDown(e) {
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            mouse.x = (x/window.innerWidth)*2-1; mouse.y = -(y/window.innerHeight)*2+1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(rings);
            if (hits.length > 0) { selectedRing = hits[0].object; isDragging = true; lastX = x; }
        }

        function onMove(e) {
            if (!isDragging || !selectedRing) return;
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            selectedRing.rotation.y += (x - lastX) * 0.012;
            lastX = x;
            if (navigator.vibrate) navigator.vibrate(5);
        }

        function onUp() {
            if (selectedRing) {
                const step = (Math.PI * 2) / 10;
                const target = Math.round(selectedRing.rotation.y / step) * step;
                new TWEEN.Tween(selectedRing.rotation).to({ y: target }, 400).easing(TWEEN.Easing.Back.Out).onComplete(updateStatus).start();
            }
            isDragging = false; selectedRing = null;
        }

        function updateStatus() {
            const step = (Math.PI * 2) / 10;
            rings.forEach((r, i) => {
                let digit = Math.round((-r.rotation.y / step) % 10);
                while (digit < 0) digit += 10;
                currentStatus[i] = digit;
            });
        }

        window.addEventListener('mousedown', onDown); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
        window.addEventListener('touchstart', onDown); window.addEventListener('touchmove', onMove); window.addEventListener('touchend', onUp);

        // 5. Animations
        function checkCode() {
            const isCorrect = currentStatus.every((v, i) => v === PIN[i]);
            
            if (isCorrect) {
                if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 400]);
                
                // Success: Hide frames and explode device
                frames.forEach(f => f.visible = false);
                new TWEEN.Tween(topCap.position).to({ y: 15 }, 1200).easing(TWEEN.Easing.Quadratic.In).start();
                new TWEEN.Tween(bottomCap.position).to({ y: -15 }, 1200).easing(TWEEN.Easing.Quadratic.In).start();
                
                rings.forEach((r, i) => {
                    new TWEEN.Tween(r.position)
                        .to({ x: (i % 2 === 0 ? 12 : -12), y: r.position.y * 2, z: -8 }, 1500)
                        .easing(TWEEN.Easing.Quadratic.In).start();
                    new TWEEN.Tween(r.rotation).to({ x: Math.random()*15, z: Math.random()*15 }, 1500).start();
                });

                setTimeout(() => {
                    document.getElementById('ui').style.display = 'none';
                    document.getElementById('reward-container').style.display = 'block';
                }, 1000);

            } else {
                if (navigator.vibrate) navigator.vibrate(500);
                
                // Wrong: Shake Cryptex
                new TWEEN.Tween(cryptexGroup.position)
                    .to({ x: 0.5 }, 50).repeat(10).yoyo(true)
                    .to({ x: 0 }, 50).start();
                
                // Wrong: Random Spin all rings
                rings.forEach((r) => {
                    new TWEEN.Tween(r.rotation)
                        .to({ y: r.rotation.y + (Math.PI * 4) }, 800)
                        .easing(TWEEN.Easing.Quintic.Out)
                        .onComplete(updateStatus)
                        .start();
                });
            }
        }

        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            // Subtle idle rotation
            if (!isDragging) {
                cryptexGroup.rotation.y = Math.sin(time / 2500) * 0.05;
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
