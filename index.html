<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Steampunk Cryptex</title>
    <style>
        body { margin: 0; background: #080705; font-family: 'Courier New', Courier, monospace; overflow: hidden; touch-action: none; color: #8b6d0d; }
        
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 40px 20px; box-sizing: border-box; 
        }
        
        h1 { 
            text-shadow: 2px 2px 5px rgba(0,0,0,1); font-size: 1.5rem; 
            letter-spacing: 4px; text-align: center; margin: 0; color: #a67c00;
        }

        .instructions { font-size: 0.7rem; letter-spacing: 1px; color: #5d4a1b; text-transform: uppercase; }

        #submit-btn {
            pointer-events: auto; background: #1a150a; border: 2px solid #5d4a1b; 
            padding: 18px 50px; font-size: 1.1rem; font-weight: bold; border-radius: 2px; 
            cursor: pointer; color: #d4af37; box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }
        #submit-btn:active { background: #3d2b1f; color: #fff; }

        #reward { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; background: #0f0a05; padding: 30px; border: 2px solid #8b6d0d; 
            z-index: 100; width: 80%; max-width: 300px;
        }
        .qr-image { width: 100%; max-width: 200px; border: 10px solid #fff; margin-top: 20px; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>MECHANICAL ENIGMA</h1>
        <div class="instructions">Align digits vertically</div>
        <button id="submit-btn" onclick="checkCode()">ENGAGE MECHANISM</button>
    </div>

    <div id="reward">
        <h2 style="color: #d4af37; margin:0;">ACCESS GRANTED</h2>
        <img src="reward-qr.png" class="qr-image" alt="Reward QR">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <script>
        const PIN = [1, 2, 3, 4]; // Change your PIN here
        let currentStatus = [0, 0, 0, 0];
        const rings = [];
        
        // 1. Scene & Camera Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Realistic Matte Lighting (No sharp reflections)
        const ambient = new THREE.AmbientLight(0xffffff, 0.4); 
        scene.add(ambient);
        
        const topLight = new THREE.DirectionalLight(0xffeeb1, 0.8);
        topLight.position.set(0, 10, 5);
        scene.add(topLight);

        const errorLight = new THREE.PointLight(0xff0000, 0); // For wrong code animation
        errorLight.position.set(0, 0, 3);
        scene.add(errorLight);

        // 2. Responsive Scaling Logic
        const isMobile = window.innerWidth < 600;
        const ringSpacing = isMobile ? 0.75 : 0.85;
        const ringScale = isMobile ? 0.9 : 1.1;

        // 3. Create Vertical Number Texture
        function createVerticalTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 1024; // Tall vertical strip
            const ctx = canvas.getContext('2d');
            
            // Matte Background (Aged Iron/Brass)
            ctx.fillStyle = '#1c1710'; 
            ctx.fillRect(0,0,128,1024);
            
            // Numbers
            ctx.fillStyle = '#b58e24';
            ctx.font = 'bold 80px Courier New';
            ctx.textAlign = 'center';
            for(let i=0; i<10; i++) {
                // We draw numbers so they wrap around the cylinder
                ctx.fillText(i, 64, (i * 102.4) + 75);
                ctx.strokeStyle = '#2d2518';
                ctx.lineWidth = 4;
                ctx.strokeRect(5, (i * 102.4) + 5, 118, 92);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        // 4. Build Cryptex
        const cryptexGroup = new THREE.Group();
        const texture = createVerticalTexture();

        // Matte Metal Material
        const matteMetal = new THREE.MeshPhongMaterial({
            color: 0x3d3220,
            shininess: 5, // Very low shininess to remove reflections
            map: texture
        });

        for(let i=0; i<4; i++) {
            const ringGeo = new THREE.CylinderGeometry(1, 1, 0.7, 40);
            const ring = new THREE.Mesh(ringGeo, matteMetal.clone());
            
            // Correct orientation for vertical reading
            ring.rotation.z = Math.PI / 2;
            ring.position.x = (i - 1.5) * ringSpacing;
            ring.scale.set(ringScale, 1, ringScale);
            ring.userData = { index: i };
            rings.push(ring);
            cryptexGroup.add(ring);
        }

        // End Bolts
        const boltGeo = new THREE.CylinderGeometry(1.1, 1.1, 0.2, 8);
        const boltMat = new THREE.MeshPhongMaterial({color: 0x1a150a, shininess: 2});
        const leftBolt = new THREE.Mesh(boltGeo, boltMat);
        leftBolt.position.x = -1.6 * ringSpacing; leftBolt.rotation.z = Math.PI/2;
        const rightBolt = new THREE.Mesh(boltGeo, boltMat);
        rightBolt.position.x = 1.6 * ringSpacing; rightBolt.rotation.z = Math.PI/2;
        cryptexGroup.add(leftBolt, rightBolt);

        scene.add(cryptexGroup);
        camera.position.z = isMobile ? 7 : 5;

        // 5. Interaction (Vertical Drag)
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedRing = null;
        let isDragging = false;
        let startY = 0;

        function handleDown(e) {
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            mouse.x = (x / window.innerWidth) * 2 - 1;
            mouse.y = -(y / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(rings);
            if (intersects.length > 0) {
                selectedRing = intersects[0].object;
                isDragging = true;
                startY = y;
            }
        }

        function handleMove(e) {
            if (!isDragging || !selectedRing) return;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            const deltaY = y - startY;
            
            // Rotate on X axis for vertical movement
            selectedRing.rotation.x += deltaY * 0.01;
            startY = y;
            if (navigator.vibrate) navigator.vibrate(5);
        }

        function handleUp() {
            if (selectedRing) {
                const step = Math.PI * 2 / 10;
                const target = Math.round(selectedRing.rotation.x / step) * step;
                
                new TWEEN.Tween(selectedRing.rotation)
                    .to({ x: target }, 500)
                    .easing(TWEEN.Easing.Back.Out)
                    .onComplete(() => {
                        let digit = Math.round((target / step) % 10);
                        while (digit < 0) digit += 10;
                        currentStatus[selectedRing.userData.index] = digit;
                    })
                    .start();
            }
            isDragging = false;
            selectedRing = null;
        }

        window.addEventListener('mousedown', handleDown);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleUp);
        window.addEventListener('touchstart', handleDown);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', handleUp);

        // 6. Logic & Animations
        function checkCode() {
            const win = currentStatus.every((v, i) => v === PIN[i]);
            
            if (win) {
                if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 500]);
                rings.forEach((r, i) => {
                    new TWEEN.Tween(r.position).to({ x: r.position.x * 10, y: -10 }, 1500).easing(TWEEN.Easing.Exponential.In).start();
                });
                setTimeout(() => {
                    document.getElementById('ui-layer').style.display = 'none';
                    document.getElementById('reward').style.display = 'block';
                }, 1000);
            } else {
                // FAIL ANIMATION: Red Flash & Violent Shake
                if (navigator.vibrate) navigator.vibrate(600);
                
                new TWEEN.Tween(errorLight).to({ intensity: 3 }, 100).yoyo(true).repeat(3).start();
                new TWEEN.Tween(cryptexGroup.position)
                    .to({ x: 0.2 }, 50).repeat(10).yoyo(true)
                    .to({ x: 0 }, 50).start();
            }
        }

        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            if (!isDragging) {
                cryptexGroup.rotation.y = Math.sin(time / 2000) * 0.1;
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
