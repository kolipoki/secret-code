<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cryptex</title>

<style>

body{
margin:0;
background:#050505;
font-family:Courier New, monospace;
overflow:hidden;
}

#ui{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
padding:40px;
box-sizing:border-box;
}

h2{
color:#d4af37;
letter-spacing:5px;
}

#submit-btn{
pointer-events:auto;
background:#d4af37;
border:2px solid #000;
padding:16px 50px;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div id="ui">

<h2>MECHANICAL UNIT</h2>

<button id="submit-btn" onclick="checkCode()">
ENGAGE LOCK
</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

<script>

const PIN=[1,2,3,4]
let currentStatus=[0,0,0,0]

const STEP=(Math.PI*2)/10

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer=new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

scene.add(new THREE.AmbientLight(0xffffff,0.9))

const light=new THREE.DirectionalLight(0xffffff,0.6)
light.position.set(5,5,10)
scene.add(light)

const rings=[]

function createTex(){

const canvas=document.createElement("canvas")

canvas.width=1024
canvas.height=128

const ctx=canvas.getContext("2d")

ctx.fillStyle="#111"
ctx.fillRect(0,0,1024,128)

ctx.textAlign="center"
ctx.textBaseline="middle"
ctx.font="bold 85px Arial"

for(let i=0;i<10;i++){

const x=(i+0.5)*(1024/10)

ctx.fillStyle="#ffcc00"
ctx.fillText(i,x,64)

ctx.strokeStyle="#333"

ctx.beginPath()
ctx.moveTo(i*(1024/10),0)
ctx.lineTo(i*(1024/10),128)
ctx.stroke()

}

const tex=new THREE.CanvasTexture(canvas)
tex.wrapS=THREE.RepeatWrapping

return tex

}

const cryptex=new THREE.Group()

/* fontos: 10 segment */
const geo=new THREE.CylinderGeometry(
1.2,
1.2,
0.8,
10
)

geo.rotateY(Math.PI/2)

for(let i=0;i<4;i++){

const y=(1.5-i)*0.95

const mat=new THREE.MeshPhongMaterial({
map:createTex(),
shininess:80
})

const ring=new THREE.Mesh(geo,mat)

ring.position.y=y
ring.userData={index:i}

rings.push(ring)
cryptex.add(ring)

/* frame */

const frameGeo=new THREE.BoxGeometry(
0.75,
0.85,
0.1
)

const edges=new THREE.EdgesGeometry(frameGeo)

const frame=new THREE.LineSegments(
edges,
new THREE.LineBasicMaterial({color:0xd4af37})
)

frame.position.set(0,y,1.205)

scene.add(frame)

}

scene.add(cryptex)

camera.position.set(0,0,7)

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

let selected=null
let dragging=false
let lastX=0

function down(e){

const x=e.touches?e.touches[0].clientX:e.clientX
const y=e.touches?e.touches[0].clientY:e.clientY

mouse.x=(x/window.innerWidth)*2-1
mouse.y=-(y/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const hits=raycaster.intersectObjects(rings)

if(hits.length){

selected=hits[0].object
dragging=true
lastX=x

TWEEN.removeAll()

}

}

function move(e){

if(!dragging)return

const x=e.touches?e.touches[0].clientX:e.clientX

const dx=x-lastX

selected.rotation.y+=dx*0.008

lastX=x

}

function up(){

if(selected){

const target=Math.round(selected.rotation.y/STEP)*STEP

new TWEEN.Tween(selected.rotation)
.to({y:target},500)
.easing(TWEEN.Easing.Back.Out)
.start()

let digit=Math.round((-target/STEP)%10)

if(digit<0)digit+=10

currentStatus[selected.userData.index]=digit

}

dragging=false
selected=null

}

window.addEventListener("mousedown",down)
window.addEventListener("mousemove",move)
window.addEventListener("mouseup",up)

window.addEventListener("touchstart",down)
window.addEventListener("touchmove",move)
window.addEventListener("touchend",up)

function checkCode(){

const ok=currentStatus.every((v,i)=>v===PIN[i])

if(ok){

rings.forEach((r,i)=>{

new TWEEN.Tween(r.position)
.to({x:(i%2?10:-10)},1500)
.start()

})

}

else{

new TWEEN.Tween(cryptex.position)
.to({x:0.3},50)
.repeat(5)
.yoyo(true)
.start()

}

}

function animate(t){

requestAnimationFrame(animate)

TWEEN.update(t)

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
