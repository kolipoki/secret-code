<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptex</title>
    <style>
        body { margin: 0; background: #121212; font-family: 'Georgia', serif; overflow: hidden; color: white; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 40px 0; box-sizing: border-box; }
        
        .controls { display: flex; gap: 25px; pointer-events: auto; }
        .wheel-ctrl { display: flex; flex-direction: column; gap: 140px; } /* Spacing for the 3D rings */
        
        .btn { 
            background: #d4af37; border: none; width: 50px; height: 50px; 
            border-radius: 50%; font-weight: bold; cursor: pointer; font-size: 1.5rem;
            box-shadow: 0 4px 0 #8b6d0d; transition: 0.1s;
        }
        .btn:active { transform: translateY(3px); box-shadow: none; }

        #submit-btn {
            pointer-events: auto; background: #d4af37; border: none; padding: 15px 40px;
            font-size: 1.2rem; font-weight: bold; border-radius: 5px; cursor: pointer;
            box-shadow: 0 5px 0 #8b6d0d; margin-bottom: 20px;
        }

        #reward { 
            display: none; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); text-align: center; 
            background: rgba(0,0,0,0.9); padding: 30px; border: 3px solid #d4af37; border-radius: 15px;
        }
        .qr-image { width: 200px; border: 5px solid white; margin-top: 15px; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h2 style="color: #d4af37; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">Törd fel a CRYPTEXet</h2>
        
        <div class="controls">
            <!-- 4 Sets of buttons for 4 rings -->
            <div class="wheel-ctrl">
                <button class="btn" onclick="rotateRing(0, 1)">▲</button>
                <button class="btn" onclick="rotateRing(0, -1)">▼</button>
            </div>
            <div class="wheel-ctrl">
                <button class="btn" onclick="rotateRing(1, 1)">▲</button>
                <button class="btn" onclick="rotateRing(1, -1)">▼</button>
            </div>
            <div class="wheel-ctrl">
                <button class="btn" onclick="rotateRing(2, 1)">▲</button>
                <button class="btn" onclick="rotateRing(2, -1)">▼</button>
            </div>
            <div class="wheel-ctrl">
                <button class="btn" onclick="rotateRing(3, 1)">▲</button>
                <button class="btn" onclick="rotateRing(3, -1)">▼</button>
            </div>
        </div>

        <button id="submit-btn" onclick="checkCode()">Cryptex nyitása</button>
    </div>

    <div id="reward">
        <h1 style="color: #d4af37;">Nyitás engedélyezve</h1>
        <p>Olvasd be a következő nyomot:</p>
        <img src="reward-qr.png" class="qr-image">
    </div>

    <!-- Load Three.js and Tween for animation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <script>
        const PIN = [3, 9, 8, 5]; // SET YOUR PIN HERE
        let currentStatus = [0, 0, 0, 0];
        const rings = [];
        
        // 1. Setup Scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xd4af37, 1);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // 2. Create Rings
        const ringGroup = new THREE.Group();
        const loader = new THREE.TextureLoader();

        function createRing(xPos) {
            const geometry = new THREE.CylinderGeometry(1, 1, 0.6, 32);
            
            // Create a texture for numbers 0-9
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#222'; ctx.fillRect(0,0,512,64);
            ctx.fillStyle = '#d4af37'; ctx.font = 'bold 40px Serif';
            ctx.textAlign = 'center';
            for(let i=0; i<10; i++) {
                ctx.fillText(i, (i * 51.2) + 25, 45);
            }
            
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            
            const material = new THREE.MeshStandardMaterial({ 
                map: tex, 
                metalness: 0.9, 
                roughness: 0.2, 
                color: 0x888888 
            });
            
            const ring = new THREE.Mesh(geometry, material);
            ring.rotation.z = Math.PI / 2; // Flip cylinder sideways
            ring.position.x = xPos;
            return ring;
        }

        for(let i=0; i<4; i++) {
            const r = createRing((i - 1.5) * 0.7);
            rings.push(r);
            ringGroup.add(r);
        }
        scene.add(ringGroup);
        camera.position.z = 4;

        // 3. Rotation Logic
        function rotateRing(idx, dir) {
            currentStatus[idx] = (currentStatus[idx] - dir + 10) % 10;
            
            new TWEEN.Tween(rings[idx].rotation)
                .to({ x: rings[idx].rotation.x + (dir * (Math.PI * 2 / 10)) }, 300)
                .easing(TWEEN.Easing.Back.Out)
                .start();

            if (navigator.vibrate) navigator.vibrate(40);
        }

        // 4. Submit Logic
        function checkCode() {
            const success = currentStatus.every((val, i) => val === PIN[i]);
            
            if (success) {
                if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300]);
                
                // Animation: Slide rings apart
                rings.forEach((r, i) => {
                    new TWEEN.Tween(r.position).to({ x: r.position.x * 5, y: -5 }, 1000).start();
                });
                
                setTimeout(() => {
                    document.getElementById('ui-layer').style.display = 'none';
                    document.getElementById('reward').style.display = 'block';
                }, 500);
            } else {
                if (navigator.vibrate) navigator.vibrate(500);
                // Shake Camera
                new TWEEN.Tween(camera.position).to({ x: 0.2 }, 50).repeat(5).yoyo(true).to({x:0}, 50).start();
            }
        }

        // Render Loop
        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
