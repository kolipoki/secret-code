<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Cryptex</title>

<style>

body{
margin:0;
background:#000;
overflow:hidden;
font-family:Courier New;
}

#ui{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
padding:40px;
pointer-events:none;
box-sizing:border-box;
}

h2{
color:#d4af37;
letter-spacing:6px;
}

button{
pointer-events:auto;
padding:16px 50px;
background:#d4af37;
border:none;
font-weight:bold;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="ui">
<h2>CRYPtex LOCK</h2>
<button onclick="checkCode()">ENGAGE LOCK</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

<script>

const PIN=[1,2,3,4]
let digits=[0,0,0,0]

const STEP=Math.PI*2/10

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
100
)

camera.position.z=8

const renderer=new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

renderer.toneMapping=THREE.ACESFilmicToneMapping

document.body.appendChild(renderer.domElement)



/* LIGHTING */

scene.add(new THREE.AmbientLight(0xffffff,1.2))

const key=new THREE.DirectionalLight(0xffffff,1.4)
key.position.set(5,6,5)
scene.add(key)

const rim=new THREE.DirectionalLight(0xffffff,.6)
rim.position.set(-6,3,-4)
scene.add(rim)



/* FAKE HDR REFLECTION */

const env=new THREE.TextureLoader().load(
"https://threejs.org/examples/textures/2294472375_24a3b8ef46_o.jpg"
)

env.mapping=THREE.EquirectangularReflectionMapping

scene.environment=env



/* NUMBER TEXTURE */

function numberTexture(){

const c=document.createElement("canvas")
c.width=1024
c.height=128

const g=c.getContext("2d")

g.fillStyle="#222"
g.fillRect(0,0,1024,128)

g.textAlign="center"
g.textBaseline="middle"
g.font="bold 90px Arial"

for(let i=0;i<10;i++){

const x=(i+.5)*102.4

g.fillStyle="#ffcc33"

g.shadowColor="#000"
g.shadowBlur=20
g.fillText(i,x,64)

g.strokeStyle="#000"
g.lineWidth=4
g.strokeText(i,x,64)

}

return new THREE.CanvasTexture(c)

}

const tex=numberTexture()



/* GROUP */

const cryptex=new THREE.Group()
scene.add(cryptex)



/* CENTER SHAFT */

const shaft=new THREE.Mesh(

new THREE.CylinderGeometry(.25,.25,6,32),

new THREE.MeshStandardMaterial({
metalness:1,
roughness:.2,
color:0xaaaaaa
})

)

cryptex.add(shaft)



/* RINGS */

const rings=[]

const ringGeo=new THREE.CylinderGeometry(1.2,1.2,.8,60)

ringGeo.rotateY(Math.PI/2)

for(let i=0;i<4;i++){

const mat=new THREE.MeshStandardMaterial({

map:tex,
metalness:.9,
roughness:.3

})

const ring=new THREE.Mesh(ringGeo,mat)

ring.position.y=(1.5-i)*.95

ring.userData.index=i

rings.push(ring)

cryptex.add(ring)



/* GOLD FRAME */

const frame=new THREE.LineSegments(

new THREE.EdgesGeometry(new THREE.BoxGeometry(.9,.9,.1)),

new THREE.LineBasicMaterial({color:0xd4af37})

)

frame.position.set(0,ring.position.y,1.25)

scene.add(frame)

}



/* END CAPS */

function cap(y){

const mesh=new THREE.Mesh(

new THREE.CylinderGeometry(1.35,1.35,.5,32),

new THREE.MeshStandardMaterial({
metalness:1,
roughness:.25,
color:0xbbbbbb
})

)

mesh.position.y=y

cryptex.add(mesh)

}

cap(2.3)
cap(-2.3)



/* INTERACTION */

const raycaster=new THREE.Raycaster()

const mouse=new THREE.Vector2()

let selected=null
let drag=false
let lastX=0

function digitFromRotation(rot){

let d=(-Math.round(rot/STEP))%10
return (d+10)%10

}

function snap(r){

const target=Math.round(r.rotation.y/STEP)*STEP

new TWEEN.Tween(r.rotation)
.to({y:target},400)
.easing(TWEEN.Easing.Back.Out)
.start()

digits[r.userData.index]=digitFromRotation(target)

}



function down(e){

const x=e.clientX||e.touches[0].clientX
const y=e.clientY||e.touches[0].clientY

mouse.x=x/window.innerWidth*2-1
mouse.y=-(y/window.innerHeight*2-1)

raycaster.setFromCamera(mouse,camera)

const hits=raycaster.intersectObjects(rings)

if(hits.length){

selected=hits[0].object
drag=true
lastX=x

TWEEN.removeAll()

}

}

function move(e){

if(!drag)return

const x=e.clientX||e.touches[0].clientX

const dx=x-lastX

selected.rotation.y+=dx*.008

lastX=x

}

function up(){

if(selected)snap(selected)

drag=false
selected=null

}

window.addEventListener("mousedown",down)
window.addEventListener("mousemove",move)
window.addEventListener("mouseup",up)

window.addEventListener("touchstart",down)
window.addEventListener("touchmove",move)
window.addEventListener("touchend",up)



/* CHECK PIN */

function checkCode(){

console.log(digits)

if(digits.every((v,i)=>v===PIN[i])){

rings.forEach((r,i)=>{

new TWEEN.Tween(r.position)

.to({z:(i%2?3:-3)},1500)

.easing(TWEEN.Easing.Cubic.Out)

.start()

})

}

else{

new TWEEN.Tween(cryptex.rotation)
.to({z:.1},80)
.repeat(6)
.yoyo(true)
.start()

}

}



/* LOOP */

function animate(t){

requestAnimationFrame(animate)

TWEEN.update(t)

renderer.render(scene,camera)

}

animate()



</script>
</body>
</html>
