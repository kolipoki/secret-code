<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Precision Cryptex</title>
    <style>
        body { margin: 0; background: #050505; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        #ui { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 40px; box-sizing: border-box; 
        }
        h2 { color: #d4af37; letter-spacing: 5px; text-shadow: 0 0 15px #000; margin: 0; text-align: center; }
        #submit-btn {
            pointer-events: auto; background: #d4af37; border: 2px solid #000; 
            padding: 16px 50px; font-size: 1.2rem; font-weight: bold; 
            border-radius: 4px; cursor: pointer; color: #111;
            box-shadow: 0 6px 20px rgba(0,0,0,0.8); transition: 0.1s;
        }
        #submit-btn:active { transform: translateY(3px); box-shadow: none; }
        #reward-container { 
            display: none; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); text-align: center; 
            background: #111; padding: 40px; border: 3px solid #d4af37; 
            z-index: 1000; box-shadow: 0 0 50px #d4af37; color: white;
        }
        .qr-image { width: 220px; border: 6px solid #fff; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>MECHANICAL UNIT</h2>
        <button id="submit-btn" onclick="checkCode()">ENGAGE LOCK</button>
    </div>

    <div id="reward-container">
        <h1>UNLOCKED</h1>
        <p>The code is revealed:</p>
        <img src="reward-qr.png" class="qr-image">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <script>
        const PIN = [1, 2, 3, 4]; // SET YOUR PIN
        let currentStatus = [0, 0, 0, 0];
        const rings = [];
        const STEP = (Math.PI * 2) / 10; 
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(5, 5, 10);
        scene.add(dirLight);

        // --- 1. THE TEXTURE (Ensuring numbers are perfectly centered) ---
        function createPrecisionTex() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#111'; ctx.fillRect(0,0,1024,128);
            ctx.textAlign = 'center';
            ctx.font = 'bold 90px Arial';
            
            for(let i=0; i<10; i++) {
                const x = (i * 102.4) + 51.2; // Number is in the dead center of the slot
                ctx.fillStyle = '#ffcc00';
                ctx.fillText(i, x, 95);
                ctx.strokeStyle = '#333';
                ctx.strokeRect(i * 102.4, 0, 102.4, 128);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            // Shift texture by half a digit so "0" starts in the front
            tex.offset.x = -0.05; 
            return tex;
        }

        const cryptexGroup = new THREE.Group();
        const ringTex = createPrecisionTex();
        const ringMat = new THREE.MeshPhongMaterial({ map: ringTex, shininess: 30 });
        
        // Use a higher segment count (64) for perfect circular rotation
        const ringGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.8, 64);
        // Rotate the geometry itself so Three.js UV start point is at the side, not front
        ringGeo.rotateY(-Math.PI / 2);

        for(let i=0; i<4; i++) {
            const yPos = (1.5 - i) * 0.95;
            const ring = new THREE.Mesh(ringGeo, ringMat.clone());
            ring.position.y = yPos;
            ring.userData = { index: i };
            rings.push(ring);
            cryptexGroup.add(ring);

            // 3D Visual Frame
            const boxGeo = new THREE.BoxGeometry(0.7, 0.85, 0.2);
            const edges = new THREE.EdgesGeometry(boxGeo);
            const frame = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xd4af37, linewidth: 4 }));
            frame.position.set(0, yPos, 1.22);
            scene.add(frame);
        }

        scene.add(cryptexGroup);
        camera.position.set(0, 0, 8);

        // --- 2. THE SNAP LOGIC (The "Magic" part) ---
        function snapRing(ring) {
            // Calculate exactly which multiple of 36 degrees we are closest to
            const targetRotation = Math.round(ring.rotation.y / STEP) * STEP;
            
            new TWEEN.Tween(ring.rotation)
                .to({ y: targetRotation }, 400)
                .easing(TWEEN.Easing.Back.Out) // Gives it a mechanical "click" bounce
                .onComplete(() => {
                    // Normalize digit calculation
                    let digit = Math.round((-targetRotation / STEP) % 10);
                    if (digit < 0) digit += 10;
                    currentStatus[ring.userData.index] = digit;
                })
                .start();
        }

        // --- 3. INTERACTION ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedRing = null, isDragging = false, lastX = 0;

        function onDown(e) {
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            mouse.x = (x/window.innerWidth)*2-1; mouse.y = -(y/window.innerHeight)*2+1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(rings);
            if (hits.length > 0) { 
                selectedRing = hits[0].object; 
                isDragging = true; 
                lastX = x; 
                TWEEN.removeAll(); // Stop snapping if user grabs it mid-spin
            }
        }

        function onMove(e) {
            if (!isDragging || !selectedRing) return;
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            selectedRing.rotation.y += (x - lastX) * 0.01;
            lastX = x;
            if (navigator.vibrate) navigator.vibrate(5);
        }

        function onUp() {
            if (selectedRing) snapRing(selectedRing);
            isDragging = false; selectedRing = null;
        }

        window.addEventListener('mousedown', onDown); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
        window.addEventListener('touchstart', onDown); window.addEventListener('touchmove', onMove); window.addEventListener('touchend', onUp);

        // --- 4. SUCCESS / FAIL ---
        function checkCode() {
            const win = currentStatus.every((v, i) => v === PIN[i]);
            if (win) {
                if (navigator.vibrate) navigator.vibrate([100, 50, 400]);
                rings.forEach((r, i) => {
                    new TWEEN.Tween(r.position).to({ x: (i%2==0?10:-10), z: -10 }, 1500).start();
                });
                setTimeout(() => {
                    document.getElementById('ui').style.display = 'none';
                    document.getElementById('reward-container').style.display = 'block';
                }, 1000);
            } else {
                if (navigator.vibrate) navigator.vibrate(500);
                new TWEEN.Tween(cryptexGroup.position).to({ x: 0.5 }, 50).repeat(10).yoyo(true).to({x:0}, 50).start();
                rings.forEach(r => {
                    new TWEEN.Tween(r.rotation).to({ y: r.rotation.y + (Math.PI*4) }, 800).easing(TWEEN.Easing.Quintic.Out).onComplete(() => snapRing(r)).start();
                });
            }
        }

        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            if (!isDragging) cryptexGroup.rotation.y = Math.sin(time / 2000) * 0.05;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
